<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Siskom Laboratory</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f3f5f7;
}

.login-box{
    width:400px;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.login-box h2{
    text-align:center;
    color:#88A947;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:13px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#88A947;
}

button{
    width:100%;
    padding:13px;
    border:none;
    background:#88A947;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#6d8c34;
}

#error{
    color:red;
    text-align:center;
    margin-top:15px;
    min-height:20px;
}

</style>

</head>

<body>

<div class="login-box">

    <h2>LOGIN</h2>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Masukkan Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Masukkan Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="error"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
